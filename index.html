<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESG 永續報告書服務 | 臺南市織英教育與公益協會</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">

    <style>
        :root {
            --bg-deep: #0a1630;
            --brand-blue: #1a5fa8;
            --brand-cyan: #3ca0f5;
            --text-dark: #121824;
        }

        /* 物理級防歪設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Serif TC', serif; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; background-color: #f5f8fc; }

        /* 導覽列 */
        .nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px; z-index: 1000;
            background: rgba(245, 248, 252, 0.98);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid #d2dfef;
        }
        body { padding-top: 80px; }

        .nav-logo { font-size: 16px; font-weight: 700; white-space: nowrap; }
        .btn-consult { background: var(--brand-blue); color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 14px; }

        /* Hero 與田字格 */
        .hero { background: var(--bg-deep); color: white; padding: 60px 20px; text-align: center; width: 100%; }
        .hero h1 { font-size: 32px; margin-bottom: 30px; line-height: 1.4; }
        
        .chips-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            max-width: 500px; margin: 0 auto;
        }
        .tag-chip {
            padding: 12px 5px; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px; font-size: 14px; font-weight: 600;
        }

        /* 動畫區塊 */
        .section { padding: 60px 20px; width: 100%; max-width: 800px; margin: 0 auto; }
        .target-box { background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #d2dfef; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .target-li { display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-start; }
        .target-li i { color: #2e7d32; font-size: 20px; flex-shrink: 0; margin-top: 3px; }
        .target-li p { font-size: 16px; line-height: 1.6; }

        /* 聯絡資訊 */
        .cta-section { background: var(--bg-deep); color: white; padding: 50px 20px; text-align: center; }
        .info-row { display: block; font-size: 18px; color: white; margin-bottom: 20px; text-decoration: none; }
        .btn-line { 
            display: inline-block; background: #06c755; color: white; 
            padding: 14px 28px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 16px;
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-logo"><strong>織英教育與公益協會</strong></div>
        <a href="mailto:info@chihying.org" class="btn-consult">預約諮詢</a>
    </nav>

    <section class="hero">
        <h1>盤點企業行動，<br>回應永續需求</h1>
        <div class="chips-container">
            <div class="tag-chip">供應鏈合作</div>
            <div class="tag-chip">客戶要求</div>
            <div class="tag-chip">補助申請</div>
            <div class="tag-chip">對外溝通</div>
        </div>
    </section>

    <section class="section">
        <div class="target-box" data-aos="fade-up" data-aos-duration="800">
            <div class="target-li">
                <i class="fa-solid fa-circle-check"></i>
                <p>有員工照顧、節能改善或社區參與的行動紀錄。</p>
            </div>
            <div class="target-li">
                <i class="fa-solid fa-circle-check"></i>
                <p>開始被客戶詢問 ESG 資訊，需要清楚的文件來回應。</p>
            </div>
            <div class="target-li">
                <i class="fa-solid fa-circle-check"></i>
                <p>希望完成第一份報告書，從現有資料出發即可。</p>
            </div>
        </div>
    </section>

    <footer class="cta-section">
        <a href="tel:063120098" class="info-row"><i class="fa-solid fa-phone"></i> 06-3120098</a>
        <a href="https://line.me/R/ti/p/@M_565lgsrt_GW" class="btn-line">
            <i class="fa-brands fa-line"></i> 加入 LINE 官方帳號諮詢
        </a>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: false, offset: 50 });
    </script>
</body>
</html>
